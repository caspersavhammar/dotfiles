start-at-login = true
after-login-command = []

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = ["layout tiling"]

[mode.main.binding]
# See: https://nikitabobko.github.io/AeroSpace/goodness#open-a-new-window-with-applescript

alt-enter = '''exec-and-forget osascript -e '
tell application "Ghostty"
    set win to new window with configuration new surface configuration
end tell'
'''

alt-shift-enter = '''exec-and-forget osascript -e '
tell application "Safari"
    make new document at end of documents
    activate
end tell'
'''

alt-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop left'
alt-j = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop down'
alt-k = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop up'
alt-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Consider using 'join-with' command as a 'split' replacement if you want to enable normalizations
alt-b = 'split horizontal'
alt-v = 'split vertical'

# alt-f = 'fullscreen'

alt-s = 'layout v_accordion'               # 'layout stacking' in i3
alt-w = 'layout h_accordion'               # 'layout tabbed' in i3
alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

# Not supported, because this command is redundant in AeroSpace mental model.
# See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
#alt-space = 'focus toggle_tiling_floating'

# `focus parent`/`focus child` are not yet supported, and it's not clear whether they
# should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
# alt-a = 'focus parent'

cmd-sectionSign = 'workspace --auto-back-and-forth 0' # Desktop/Misc
cmd-1 = 'workspace --auto-back-and-forth 1'
cmd-2 = 'workspace --auto-back-and-forth 2'
cmd-3 = 'workspace --auto-back-and-forth 3'
cmd-4 = 'workspace --auto-back-and-forth 4'
cmd-5 = 'workspace --auto-back-and-forth 5'
cmd-6 = 'workspace --auto-back-and-forth 6'
cmd-7 = 'workspace --auto-back-and-forth 7'
cmd-8 = 'workspace --auto-back-and-forth 8'
cmd-9 = 'workspace --auto-back-and-forth 9'
cmd-0 = 'workspace --auto-back-and-forth 10'

cmd-shift-sectionSign = 'move-node-to-workspace 0'
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

alt-f = 'reload-config'

alt-r = 'mode resize'

[workspace-to-monitor-force-assignment]

0 = ['secondary', 'main']

1 = ['secondary', 'main']

2 = ['secondary', 'main']

3 = ['secondary', 'main']

4 = ['secondary', 'main']

5 = ['secondary', 'main']

6 = 'main'

7 = 'main'

8 = 'main'

9 = 'main'

# other configs
# cmd-tab = 'workspace-back-and-forth'


[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'
